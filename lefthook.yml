# Lefthook — git hooks for sdcorejs-agent
#
# Install once after `npm install`:
#   npx lefthook install
#
# What it enforces:
# - Both mirrors (.claude/skills/ for project-local + plugin/skills/ for the
#   Claude Code plugin distribution) stay in sync with skills/<track>/*.md
# - any commit that edits skills/<track>/*.md regenerates both mirrors and stages them
# - no hardcoded Core UI package/version (`@sdcorejs/angular` or legacy `@sd-angular/core`) in 10-init-portal.md (must use <CORE_UI_PACKAGE_NAME>/<CORE_VERSION> placeholders)
# - every .md under skills/ (except _refs/, shared/templates/, shared/specs/) has YAML frontmatter
#
# If lefthook is missing, fall back to the manual command in .claude/README.md.

pre-commit:
  parallel: true
  commands:
    sync-skills:
      # Trigger only when source skills changed.
      glob: "skills/**/*.md"
      run: bash .claude/sync-skills.sh && git add .claude/skills plugin/skills
    check-mirror:
      # Always verify both mirrors are consistent (catches the case where
      # someone hand-edits .claude/skills/ or plugin/skills/ without touching skills/).
      glob:
        - ".claude/skills/**"
        - "plugin/skills/**"
      run: bash .claude/sync-skills.sh --check
    no-hardcoded-core-version:
      # Single source of truth for Core UI package name + version is
      # skills/tracks/angular-portal/_refs/core-version.md. Inside the three
      # init skills (10-init-portal, 11-init-module, 12-init-entity), every
      # reference must use placeholders <CORE_VERSION> + <CORE_UI_PACKAGE_NAME>
      # (substituted by the agent at generation time). Hardcoded literal
      # a literal version or `from '@sdcorejs/angular...'` / `from '@sd-angular/core...'` in imports means drift.
      glob:
        - "skills/tracks/angular-portal/10-init-portal.md"
        - "skills/tracks/angular-portal/11-init-module.md"
        - "skills/tracks/angular-portal/12-init-entity.md"
      run: bash .claude/check-core-version-placeholder.sh {staged_files}
    skill-frontmatter:
      # Every .md under skills/ must have YAML frontmatter (name +
      # description) so the agent can dispatch it — except files in
      # _refs/ (reference data) and shared/templates/, shared/specs/
      # (placeholder dirs). Without frontmatter, sync-skills.sh
      # silently drops the file from the mirror.
      glob: "skills/**/*.md"
      run: bash .claude/check-skill-frontmatter.sh {staged_files}

# Convenience: `lefthook run check` to verify locally without committing.
check:
  commands:
    sync:
      # Checks BOTH .claude/skills/ and plugin/skills/ against the source.
      run: bash .claude/sync-skills.sh --check
    core-version-placeholder:
      run: bash .claude/check-core-version-placeholder.sh skills/tracks/angular-portal/10-init-portal.md skills/tracks/angular-portal/11-init-module.md skills/tracks/angular-portal/12-init-entity.md
    skill-frontmatter:
      # Check ALL skill .md files in one shot (find handles the exclusions inside the script).
      run: bash -c 'find skills -name "*.md" -type f -print0 | xargs -0 bash .claude/check-skill-frontmatter.sh'
