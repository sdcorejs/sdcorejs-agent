# Build + deploy the showcase site (site/) to GitHub Pages.
#
# Trigger:
#   - Push to main that touches site/ or images/ or this workflow
#   - Manual run via the Actions UI (workflow_dispatch)
#
# GitHub Pages serves static files only. There's no SSR / ISR / configurable
# cache TTL on Pages — see site/README.md for the cache-policy note.
#
# Setup (one-time, in repo Settings → Pages):
#   Build and deployment → Source: "GitHub Actions"

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - images/**
      - .github/workflows/deploy-site.yml
  workflow_dispatch:

# Required for the official deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one production deploy at a time. Cancel in-progress runs if a new
# commit lands; let any queued runs finish so the final commit is what ships.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: site
        env:
          # Repo path under <owner>.github.io. Update if the repo is renamed.
          SITE_BASE: /sdcorejs-agent/
          SITE_URL: https://sdcorejs.github.io
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
